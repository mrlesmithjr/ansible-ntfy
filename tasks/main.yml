---
- name: Assert ntfy_site_domain is configured
  ansible.builtin.assert:
    that:
      - ntfy_site_domain | length > 0
    fail_msg: >-
      ntfy_site_domain must be set to your public domain name (e.g. ntfy.example.com).
      ntfy refuses to start without a valid base-url.
  tags: [ntfy]

- name: Assert ntfy_webpush_email is set when web push is enabled
  ansible.builtin.assert:
    that:
      - ntfy_webpush_email | length > 0
    fail_msg: >-
      ntfy_webpush_email must be set to a valid email address when web push keys are configured.
  when: ntfy_webpush_public_key | length > 0 and ntfy_webpush_private_key | length > 0
  tags: [ntfy]

- name: Create ntfy data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
  loop:
    - "{{ ntfy_data_root }}"
    - "{{ ntfy_data_root }}/cache"
    - "{{ ntfy_data_root }}/cache/attachments"
    - "{{ ntfy_data_root }}/lib"
  tags: [ntfy]

- name: Deploy ntfy config
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ ntfy_data_root }}/config.yml"
    owner: root
    group: root
    mode: "0640"
  become: true
  notify: Restart ntfy
  tags: [ntfy]

- name: Deploy ntfy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ntfy_data_root }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  become: true
  notify: Restart ntfy
  tags: [ntfy]

- name: Ensure extra Docker networks exist
  community.docker.docker_network:
    name: "{{ item }}"
    driver: bridge
    state: present
  become: true
  loop: "{{ ntfy_extra_networks }}"
  when: ntfy_enable_extra_networks | bool
  tags: [ntfy]

- name: Launch ntfy with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ ntfy_data_root }}"
    state: present
  become: true
  tags: [ntfy]

- name: Wait for ntfy to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ntfy_host_port }}/v1/health"
    method: GET
    status_code:
      - 200
  register: ntfy_health_check
  until: ntfy_health_check.status == 200
  retries: 24
  delay: 5
  changed_when: false
  tags: [ntfy]
