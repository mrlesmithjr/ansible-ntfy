---
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 0'
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install ansible-lint yamllint
      - run: yamllint .
      - run: ansible-lint
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ansible:
          - stable-2.15
          - stable-2.16
          - stable-2.17
          - stable-2.18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install "ansible-core==${{ matrix.ansible }}.*" 2>/dev/null || pip install ansible-core
      - run: |
          printf '[defaults]\nroles_path=../\n' >ansible.cfg
          ansible-playbook --syntax-check tests/test.yml
